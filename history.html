<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title id="txtPageTitle">Lịch sử dịch thuật - Screen Translator</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="history.css">
</head>
<body>
  <div class="history-container">
    <header class="history-header">
      <div class="header-left">
        <img src="icons/icon128.png" alt="Logo" class="main-logo">
        <div class="title-group">
          <h1 id="txtTitle">Lịch sử dịch thuật</h1>
          <p id="txtSubtitle" class="subtitle">Quản lý các bản dịch đã thực hiện</p>
        </div>
      </div>
      <div class="header-right">
        <button id="btnBackToSettings" class="btn-secondary" style="margin-left: 10px;">Cài đặt</button>
      </div>
    </header>

    <!-- Toolbar for search, filter & actions -->
    <section class="toolbar-section">
      <div class="search-box">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchBar" placeholder="Tìm kiếm trong lịch sử...">
      </div>

      <div class="filter-dropdown-container">
        <select id="langFilter">
          <option value="all">Tất cả ngôn ngữ</option>
        </select>
      </div>

      <div class="actions-group">
        <span class="history-count-badge" id="historyCount">0 bản dịch</span>
        <button id="btnClearAll" class="btn-danger">Xóa tất cả</button>
      </div>
    </section>

    <!-- History List -->
    <main class="history-main">
      <div id="historyList" class="history-grid"></div>
      
      <!-- Load More Button -->
      <div class="pagination-row">
        <button id="btnLoadMore" class="btn-secondary" style="display: none;">Xem thêm</button>
      </div>
    </main>

    <footer class="history-footer">
      <p id="txtFooterCopyright" class="copyright">Screen Translator - Lịch sử dịch thuật lưu trữ tối đa 200 mục gần nhất.</p>
    </footer>
  </div>
  <script src="history.js"></script>
</body>
</html>
