<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Sliding Error Toast -->
    <!-- Premium Error Toast Banner overlay -->
    <div id="errorToast" class="error-toast">
      <div class="error-toast-badge">
        <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#ff5252" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>
      </div>
      <div class="error-toast-content">
        <div class="error-toast-header">
          <span id="errorToastTitle" class="error-toast-title">Lỗi Dịch Thuật</span>
          <span id="errorToastClose" class="error-toast-close">&times;</span>
        </div>
        <div id="errorToastText" class="error-toast-text"></div>
      </div>
    </div>

    <header>
      <div class="header-main">
        <img src="icons/icon48.png" alt="Logo" class="logo">
        <h1>Screen Translator</h1>
      </div>
      <div class="header-actions">
        <button id="btnHistory" class="btn-icon" title="Lịch sử dịch / History">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0 1 18 0z"/>
          </svg>
        </button>
        <button id="btnOptions" class="btn-icon" title="Cài đặt / Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Tab navigation bar -->
    <div class="tabs-nav">
      <button type="button" id="tabBtnTranslate" class="tab-btn active">Dịch thuật</button>
      <button type="button" id="tabBtnQr" class="tab-btn">Mã QR</button>
    </div>

    <main>
      <!-- TAB 1: TRANSLATOR PANEL -->
      <div id="tabContentTranslate" class="tab-pane">
        <!-- Section 1: Capture regional translation & Selected text translation -->
        <div class="action-section">
          <button type="button" id="btnTranslate" class="btn-primary">Chọn vùng màn hình để dịch</button>
          <button type="button" id="btnTextSelectTranslate" class="btn-primary-outline">Dịch văn bản bôi đen</button>
        </div>

        <!-- Divider -->
        <div class="divider">hoặc dịch văn bản nhanh</div>

        <!-- Section 2: Quick Text Translation -->
        <div class="form-group">
          <div class="lang-row">
            <label>Dịch sang:</label>
            <div class="searchable-dropdown">
              <input type="text" id="targetLangSearch" placeholder="Tìm kiếm..." autocomplete="off">
              <span class="dropdown-arrow">
                <svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                  <polyline points="6 9 12 15 18 9"></polyline>
                </svg>
              </span>
              <div id="targetLangList" class="dropdown-list"></div>
            </div>
          </div>
          
          <div class="textarea-container">
            <textarea id="textInput" placeholder="Nhập hoặc dán văn bản cần dịch tại đây..."></textarea>
            <div id="imagePreviewContainer" class="image-preview-container" style="display: none;">
              <img id="imagePreview" class="image-preview" src="" alt="Pasted Image">
              <button type="button" id="btnRemoveImage" class="btn-remove-image" title="Xóa ảnh / Remove Image">
                <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
            <button type="button" id="btnPaste" class="btn-paste" title="Dán từ Clipboard / Paste from Clipboard">
              <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
              </svg>
            </button>
          </div>
          
          <button type="button" id="btnTextTranslate" class="btn-secondary-action">Dịch văn bản</button>
        </div>

        <!-- Text Translation Output -->
        <div id="textOutputContainer" class="output-container" style="display: none;">
          <label>Bản dịch:</label>
          <div id="textOutput"></div>
        </div>
      </div>

      <!-- TAB 2: QR PANEL -->
      <div id="tabContentQr" class="tab-pane" style="display: none;">
        <!-- Section 1: QR Code Scanner -->
        <div class="action-section qr-section">
          <div class="qr-buttons-row">
            <button type="button" id="btnQrScanManual" class="btn-primary">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; display: inline-block; vertical-align: middle;">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <rect x="7" y="7" width="3" height="3"></rect>
                <rect x="14" y="7" width="3" height="3"></rect>
                <rect x="7" y="14" width="3" height="3"></rect>
                <rect x="14" y="14" width="3" height="3"></rect>
              </svg>
              <span id="lblQrScanManual">Quét thủ công</span>
            </button>
            <button type="button" id="btnQrScanAuto" class="btn-primary-outline">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 4px; display: inline-block; vertical-align: middle;">
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="22" y1="12" x2="18" y2="12"></line>
                <line x1="6" y1="12" x2="2" y2="12"></line>
                <line x1="12" y1="6" x2="12" y2="2"></line>
                <line x1="12" y1="22" x2="12" y2="18"></line>
              </svg>
              <span id="lblQrScanAuto">Tự động quét</span>
            </button>
          </div>
          
          <div id="qrUploadZone" class="qr-upload-zone">
            <input type="file" id="qrFileInput" accept="image/*" style="display: none;">
            <div id="qrUploadPromptContainer" class="upload-prompt">
              <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 6px; color: #8ab4f8; display: inline-block;">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
              </svg>
              <span id="lblQrUploadPrompt">Kéo thả ảnh QR hoặc click để tải lên / Dán ảnh</span>
            </div>
            <div id="qrResultContainer" class="qr-result-view" style="display: none;">
              <div class="qr-result-header">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#4caf50" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; vertical-align: middle;">
                  <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
                <span id="lblQrSuccessTitle" style="vertical-align: middle; margin-left: 4px;">Quét thành công!</span>
              </div>
              
              <div class="qr-result-text-container">
                <div class="qr-result-text" id="qrResultText"></div>
                <button type="button" class="btn-copy-qr-text" id="btnCopyQrResult" title="Sao chép / Copy"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect></svg></button>
              </div>
              
              <div class="qr-result-actions">
                <button type="button" class="qr-result-btn open-btn" id="btnOpenQrResult" style="display: none;">Mở Link</button>
                <button type="button" class="qr-result-btn" id="btnTranslateQrResult">Dịch</button>
                <button type="button" class="qr-result-btn" id="btnResetQrScan">Quét tiếp</button>
              </div>
            </div>
          </div>
        </div>

        <div class="divider" id="lblDividerQrGen">hoặc tạo mã QR</div>

        <!-- Section 2: QR Code Generator -->
        <div class="form-group qr-generator-section">
          <div class="textarea-container">
            <textarea id="qrGenInput" placeholder="Nhập văn bản hoặc liên kết để tạo mã QR tại đây..."></textarea>
          </div>
          <button type="button" id="btnQrGenerate" class="btn-secondary-action">Tạo mã QR</button>
          
          <div id="qrGenResultContainer" class="qr-gen-result-container" style="display: none;">
            <div class="qr-gen-result-title" id="lblQrGenResultTitle">Mã QR của bạn:</div>
            <div id="qrGenResultImage" class="qr-gen-result-image"></div>
            <div class="qr-gen-result-actions">
              <button type="button" class="qr-result-btn copy-btn" id="btnDownloadQrGen">Tải ảnh QR</button>
            </div>
          </div>
        </div>
      </div>

      <div id="status" class="status-msg"></div>
    </main>
  </div>
  <script src="jsQR.js"></script>
  <script src="qrcode.js"></script>
  <script src="popup.js"></script>
</body>
</html>
