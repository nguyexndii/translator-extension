<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-main">
        <img src="icons/icon48.png" alt="Logo" class="logo">
        <h1>Screen Translator</h1>
      </div>
      <div class="header-actions">
        <button id="btnHistory" class="btn-icon" title="Lịch sử dịch / History">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0 1 18 0z"/>
          </svg>
        </button>
        <button id="btnOptions" class="btn-icon" title="Cài đặt / Settings">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
          </svg>
        </button>
      </div>
    </header>

    <main>
      <!-- Section 1: Capture regional translation & Selected text translation -->
      <div class="action-section">
        <button id="btnTranslate" class="btn-primary">Chọn vùng màn hình để dịch</button>
        <button id="btnTextSelectTranslate" class="btn-primary-outline">Dịch văn bản bôi đen</button>
      </div>

      <!-- Divider -->
      <div class="divider">hoặc dịch văn bản nhanh</div>

      <!-- Section 2: Quick Text Translation -->
      <div class="form-group">
        <div class="lang-row">
          <label>Dịch sang:</label>
          <div class="searchable-dropdown">
            <input type="text" id="targetLangSearch" placeholder="Tìm kiếm..." autocomplete="off">
            <div id="targetLangList" class="dropdown-list"></div>
          </div>
        </div>
        
        <div class="textarea-container">
          <textarea id="textInput" placeholder="Nhập hoặc dán văn bản cần dịch tại đây..."></textarea>
          <button id="btnPaste" class="btn-paste" title="Dán từ Clipboard / Paste from Clipboard">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
            </svg>
          </button>
        </div>
        
        <button id="btnTextTranslate" class="btn-secondary-action">Dịch văn bản</button>
      </div>

      <!-- Text Translation Output -->
      <div id="textOutputContainer" class="output-container" style="display: none;">
        <label>Bản dịch:</label>
        <div id="textOutput"></div>
      </div>

      <div id="status" class="status-msg"></div>

      <!-- History Section removed by user request (moved to independent tab) -->
    </main>
  </div>
  <script src="popup.js"></script>
</body>
</html>
